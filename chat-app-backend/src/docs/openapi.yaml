openapi: 3.0.0
info:
  title: Chat App Users API
  version: 1.0.0
  description: API contract for user management features

servers:
  - url: http://localhost:3000

paths:
  /users:
    post:
      summary: Create user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersResponseDto'
    get:
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsersResponseDto'

  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersResponseDto'
        '404':
          description: User not found
    put:
      summary: Update user details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/User' }
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsersResponseDto' }
    delete:
      summary: Delete user account by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsersResponseDto' }

  /users/login:
    post:
      summary: Login user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsersResponseDto' }
        '401':
          description: Invalid credentials

  /users/password/forgot:
    post:
      summary: Forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: integer }
                email: { type: string }
                newPassword: { type: string }
                token: { type: string }
      responses:
        '200':
          description: Password reset request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }

  /users/password/reset:
    post:
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: integer }
                email: { type: string }
                newPassword: { type: string }
                token: { type: string }
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }

  /users/login/google:
    post:
      summary: Login with Google account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                googleId: { type: string }
                googleToken: { type: string }
      responses:
        '200':
          description: Google login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsersResponseDto' }

components:
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        password: { type: string }
        role: { type: string }
        firstName: { type: string }
        lastName: { type: string }

    UsersResponseDto:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        role: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        isVerified: { type: boolean }
        isOnline: { type: boolean }
        lastLogin:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date